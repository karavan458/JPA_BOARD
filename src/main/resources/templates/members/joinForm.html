<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container { max-width: 560px; margin-top: 50px; }
        .field-error { color: #dc3545; font-size: 0.875em; }
    </style>
    <title>회원 가입</title>
</head>
<body>
<div class="container">
    <div class="py-5 text-center">
        <h2>회원 가입</h2>
    </div>

    <form th:action th:object="${joinDTO}" method="post">
        <div class="mb-3">
            <label th:for="loginId" class="form-label">아이디</label>
            <input type="text" th:field="*{loginId}" class="form-control"
                   th:classappend="${#fields.hasErrors('loginId')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:errors="*{loginId}">아이디 오류</div>
        </div>

        <div class="mb-3">
            <label th:for="password" class="form-label">비밀번호</label>
            <input type="password" th:field="*{password}" class="form-control"
                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:errors="*{password}">비밀번호 오류</div>
        </div>

        <div class="mb-3">
            <label th:for="name" class="form-label">이름</label>
            <input type="text" th:field="*{name}" class="form-control"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:errors="*{name}">이름 오류</div>
        </div>

        <div class="mb-3">
            <label th:for="phone" class="form-label">전화번호</label>
            <input type="text" th:field="*{phone}" class="form-control"
                   th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:errors="*{phone}">전화번호 오류</div>
        </div>

        <div class="mb-3">
            <label th:for="email" class="form-label">이메일</label>
            <input type="email" th:field="*{email}" class="form-control"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:errors="*{email}">이메일 오류</div>
        </div>

        <h5 class="mb-3 mt-4">주소 정보 (선택)</h5>
        <div class="row g-3">
            <div class="col-sm-4">
                <label th:for="city" class="form-label">도시</label>
                <input type="text" th:field="*{city}" class="form-control" placeholder="예: 서울시">
            </div>

            <div class="col-sm-5">
                <label th:for="street" class="form-label">거리</label>
                <input type="text" th:field="*{street}" class="form-control" placeholder="예: 세종대로">
            </div>

            <div class="col-sm-3">
                <label th:for="zipcode" class="form-label">우편번호</label>
                <input type="text" th:field="*{zipcode}" class="form-control" placeholder="12345">
            </div>
        </div>

        <hr class="my-4">
        <div class="row">
            <div class="col"><button class="w-100 btn btn-primary btn-lg" type="submit">가입하기</button></div>
            <div class="col"><button class="w-100 btn btn-secondary btn-lg"
                                     th:onclick="|location.href='@{/}'|" type="button">취소</button></div>
        </div>
    </form>
</div>
</body>
</html>
