<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <style>
        .field-error { border-color: #dc3545; color: #dc3545; }
    </style>
    <title>회원 가입</title>
</head>
<body>
<div style="max-width: 600px; margin: 50px auto;">
    <h2>회원 가입</h2>
    <form th:action="@{/members/join}" th:object="${joinDTO}" method="post">

        <div>
            <label for="loginId">아이디</label>
            <input type="text" th:field="*{loginId}" th:class="${#fields.hasErrors('loginId')} ? 'field-error' : ''">
            <div class="field-error" th:errors="*{loginId}">아이디 오류 메시지</div>
        </div>

        <div>
            <label for="password">비밀번호</label>
            <input type="password" th:field="*{password}" th:class="${#fields.hasErrors('password')} ? 'field-error' : ''">
            <div class="field-error" th:errors="*{password}">비밀번호 오류 메시지</div>
        </div>

        <div>
            <label for="name">이름</label>
            <input type="text" th:field="*{name}" th:class="${#fields.hasErrors('name')} ? 'field-error' : ''">
            <div class="field-error" th:errors="*{name}">이름 오류 메시지</div>
        </div>

        <div>
            <label for="email">이메일</label>
            <input type="text" th:field="*{email}" th:class="${#fields.hasErrors('email')} ? 'field-error' : ''">
            <div class="field-error" th:errors="*{email}">이메일 오류 메시지</div>
        </div>

        <div>
            <label for="phone">전화번호</label>
            <input type="text" th:field="*{phone}" th:class="${#fields.hasErrors('phone')} ? 'field-error' : ''">
            <div class="field-error" th:errors="*{phone}">전화번호 오류 메시지</div>
        </div>

        <div style="margin-top: 10px; padding: 10px; border: 1px solid #ccc;">
            <p>주소 정보</p>
            <input type="text" th:field="*{city}" placeholder="도시">
            <input type="text" th:field="*{street}" placeholder="거리">
            <input type="text" th:field="*{zipcode}" placeholder="우편번호">
        </div>

        <hr>
        <button type="submit">가입하기</button>
    </form>
</div>
</body>
</html>
