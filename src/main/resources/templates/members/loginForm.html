<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container { max-width: 400px; margin-top: 100px; }
        .error-msg { color: #dc3545; font-size: 0.875em; }
    </style>
    <title>로그인</title>
</head>
<body>
<div class="container">
    <div class="py-4 text-center">
        <h2>로그인</h2>
    </div>

    <form th:action="@{/members/login}" th:object="${loginDTO}" method="post">

        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger" role="alert">
            <p class="mb-0" th:each="err : ${#fields.globalErrors()}" th:text="${err}">전체 오류 메시지</p>
        </div>

        <div class="mb-3">
            <label th:for="loginId" class="form-label">아이디</label>
            <input type="text" th:field="*{loginId}" class="form-control"
                   th:classappend="${#fields.hasErrors('loginId')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:errors="*{loginId}">아이디 오류</div>
        </div>

        <div class="mb-3">
            <label th:for="password" class="form-label">비밀번호</label>
            <input type="password" th:field="*{password}" class="form-control"
                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:errors="*{password}">비밀번호 오류</div>
        </div>

        <hr class="my-4">

        <button class="w-100 btn btn-primary btn-lg" type="submit">로그인</button>
        <button class="w-100 btn btn-outline-secondary btn-md mt-2"
                th:onclick="|location.href='@{/}'|" type="button">홈으로</button>
    </form>
</div>
</body>
</html>
