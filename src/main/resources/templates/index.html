<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Spring Board</title>
</head>
<body>
<div class="container" style="max-width: 600px;">
    <div class="py-5 text-center">
        <h1 class="display-5 fw-bold">Spring JPA Board</h1>
        <p class="lead">게시판 프로젝트</p>
    </div>

    <div class="row g-3">
        <div class="col">
            <button class="w-100 btn btn-secondary btn-lg" type="button"
                    th:onclick="|location.href='@{/members/join}'|">
                회원 가입
            </button>
        </div>
        <div class="col">
            <button class="w-100 btn btn-primary btn-lg" type="button"
                    th:onclick="|location.href='@{/members/login}'|">
                로그인
            </button>
        </div>
    </div>

    <hr class="my-5">

    <div class="list-group">
        <a href="#" class="list-group-item list-group-item-action disabled">게시판 서비스 (준비 중)</a>
        <a href="#" class="list-group-item list-group-item-action disabled">관리자 페이지 (준비 중)</a>
    </div>
</div>
</body>
</html>
