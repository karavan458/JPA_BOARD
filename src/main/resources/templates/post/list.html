<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>게시판 목록</title>
</head>
<body>
<div class="container" style="max-width: 900px; margin-top: 50px;">

    <div class="py-5 text-center">
        <h2>게시글 목록</h2>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <form th:object="${postSearch}" th:action="@{/post/list}" method="get" class="row g-3">
                <div class="col-md-5">
                    <input type="text" th:field="*{title}" class="form-control" placeholder="제목 검색">
                </div>
                <div class="col-md-5">
                    <input type="text" th:field="*{writer}" class="form-control" placeholder="작성자 검색">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-outline-primary w-100">검색</button>
                </div>
            </form>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col">
            <button class="btn btn-primary float-end"
                    th:onclick="|location.href='@{/post/new}'|" type="button">글쓰기</button>
        </div>
    </div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>제목</th>
            <th>작성자</th>
            <th>작성일</th>
            <th class="text-center">댓글수</th> </tr>
        </thead>
        <tbody>
        <tr th:each="post : ${page.content}">
            <td th:text="${post.id}">1</td>
            <td>
                <a th:href="@{/post/{id}(id=${post.id}, page=${page.number}, title=${postSearch.title}, writer=${postSearch.writer})}"
                   th:text="${post.title}">제목</a>
            </td>
            <td th:text="${post.writerName}">작성자</td>
            <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-04-11</td>

            <td class="text-center">
            <span th:text="${post.commentCount}"
                  th:classappend="${post.commentCount > 0} ? 'text-primary font-weight-bold' : 'text-muted'">
                0
            </span>
            </td>
        </tr>
        <tr th:if="${page.isEmpty()}">
            <td colspan="5" class="text-center">조회된 게시글이 없습니다.</td> </tr>
        </tbody>
    </table>

    <nav aria-label="Page navigation" th:if="${!page.isEmpty()}"
         th:with="start=${(page.number / 10) * 10},
              end=${(start + 9 < page.totalPages) ? (start + 9) : (page.totalPages - 1)}">
        <ul class="pagination justify-content-center">

            <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/post/list(page=${page.number - 1}, title=${postSearch.title}, writer=${postSearch.writer})}">
                    이전
                </a>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(start, end)}"
                th:classappend="${i == page.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/post/list(page=${i}, title=${postSearch.title}, writer=${postSearch.writer})}"
                   th:text="${i + 1}">1</a>
            </li>

            <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/post/list(page=${page.number + 1}, title=${postSearch.title}, writer=${postSearch.writer})}">
                    다음
                </a>
            </li>
        </ul>
    </nav>

    <div class="row mt-4">
        <div class="col">
            <button class="w-100 btn btn-secondary btn-lg"
                    th:onclick="|location.href='@{/}'|" type="button">홈으로</button>
        </div>
    </div>
</div>
</body>
</html>
