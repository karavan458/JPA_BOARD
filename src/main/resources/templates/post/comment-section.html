<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="commentFragment">
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-white fw-bold">Comments</div>
        <div class="card-body">
            <div th:each="comment : ${comments.content}" class="comment-item border-bottom pb-3 mb-3">
                <div class="d-flex justify-content-between">
                    <div>
                        <strong th:text="${comment.writerName}">이름</strong>
                        <small class="text-muted ms-2" th:text="${comment.createdAt}">시간</small>
                        <p class="mt-2 mb-1" th:classappend="${comment.content == '삭제된 댓글입니다.'} ? 'deleted-comment' : ''"
                           th:text="${comment.content}">내용</p>
                    </div>
                    <form th:if="${loginMember != null and loginMember.id == comment.memberId and comment.content != '삭제된 댓글입니다.'}"
                          th:action="@{/comments/{pId}/{cId}/delete(pId=${post.id}, cId=${comment.id})}" method="post">
                        <button type="submit" class="btn btn-sm text-danger">삭제</button>
                    </form>
                </div>

                <button th:if="${loginMember != null}" class="btn btn-sm btn-link p-0 text-decoration-none"
                        th:onclick="|const form = document.getElementById('reply-form-' + ${comment.id});
                                    form.style.display = (form.style.display === 'none' ? 'block' : 'none');|">
                    답글
                </button>

                <div th:id="'reply-form-' + ${comment.id}" style="display:none;" class="mt-3 ms-4 bg-light p-3 rounded shadow-sm">
                    <form th:action="@{/post/{postId}/comment(postId=${post.id})}" method="post">
                        <input type="hidden" name="parentId" th:value="${comment.id}">
                        <input type="hidden" name="page" th:value="${comments.number}">
                        <textarea name="content" class="form-control mb-2" rows="2" placeholder="답글 내용을 입력하세요" required></textarea>
                        <div class="text-end">
                            <button type="submit" class="btn btn-sm btn-primary">답글 등록</button>
                        </div>
                    </form>
                </div>

                <div th:id="'children-container-' + ${comment.id}">
                    <div th:each="child : ${comment.children}" class="reply-section mt-2 ms-4 p-2 border-start border-3 bg-light rounded">
                        <div class="d-flex justify-content-between">
                            <div>
                                <span class="fw-bold small" th:text="${child.writerName}">작성자</span>
                                <small class="text-muted ms-1" style="font-size: 0.7rem;" th:text="${child.createdAt}">시간</small>
                                <p class="small mb-0 mt-1" th:text="${child.content}">대댓글 내용</p>
                            </div>
                            <form th:if="${loginMember != null and loginMember.id == child.memberId}"
                                  th:action="@{/comments/{pId}/{cId}/delete(pId=${post.id}, cId=${child.id})}" method="post">
                                <button type="submit" class="btn btn-sm text-danger" style="font-size: 0.7rem;">삭제</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <nav th:if="${comments.totalPages > 1}" class="mt-4">
                <ul class="pagination pagination-sm justify-content-center">
                    <li class="page-item" th:classappend="${!comments.hasPrevious} ? 'disabled'">
                        <a class="page-link" th:href="@{/post/{id}(id=${post.id}, page=${comments.number - 1})}">이전</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, comments.totalPages - 1)}"
                        th:classappend="${i == comments.number} ? 'active'">
                        <a class="page-link" th:href="@{/post/{id}(id=${post.id}, page=${i})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${!comments.hasNext} ? 'disabled'">
                        <a class="page-link" th:href="@{/post/{id}(id=${post.id}, page=${comments.number + 1})}">다음</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

    <div class="card shadow-sm border-0" th:if="${loginMember != null}">
        <div class="card-body bg-light rounded">
            <h6 class="fw-bold mb-3">Leave a Comment</h6>
            <form th:action="@{/post/{postId}/comment(postId=${post.id})}" method="post">
                <input type="hidden" name="page" th:value="${comments.number}">
                <textarea name="content" class="form-control mb-2" rows="3" placeholder="댓글을 입력하세요" required></textarea>
                <div class="text-end">
                    <button type="submit" class="btn btn-primary px-4">댓글 등록</button>
                </div>
            </form>
        </div>
    </div>
</div>
</html>
