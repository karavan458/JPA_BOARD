<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Spring Board - 상세 보기</title>
    <style>
        .reply-section { margin-left: 40px; background-color: #f9f9f9; border-left: 3px solid #dee2e6; padding: 10px; margin-top: 5px; }
        .comment-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .deleted-comment { color: #adb5bd; font-style: italic; }
    </style>
</head>
<body>
<div th:replace="~{fragment/nav :: navbar}"></div>
<div class="container" style="max-width: 800px; margin-top: 50px; margin-bottom: 100px;">

    <div class="card shadow-sm mb-5">
        <div class="card-body">
            <h3 class="fw-bold mb-3" th:text="${post.title}">제목</h3>
            <div class="d-flex justify-content-between text-muted mb-4 border-bottom pb-2">
                <span th:text="|작성자: ${post.writerName}|">작성자</span>
                <span th:text="${post.createdAt}">2026-04-15</span>
            </div>
            <div class="mb-4" style="min-height: 150px; white-space: pre-wrap;" th:text="${post.content}">내용</div>

            <div class="d-flex justify-content-between border-top pt-3">
                <a th:href="@{/post/list}" class="btn btn-secondary">목록</a>
                <div th:if="${loginMember != null and loginMember.id == post.writerId}">
                    <a th:href="@{/post/{id}/update(id=${post.id})}" class="btn btn-outline-warning">수정</a>
                    <form th:action="@{/post/{id}/delete(id=${post.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-outline-danger" onclick="return confirm('삭제하시겠습니까?')">삭제</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{post/comment-section :: commentFragment}"></div>

</div>
</body>
</html>
