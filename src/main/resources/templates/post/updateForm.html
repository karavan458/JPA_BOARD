<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>게시글 수정</title>
    <style>
        .container { max-width: 700px; margin-top: 50px; }
        .field-error { color: #dc3545; font-size: 0.875em; margin-top: 0.25rem; }
        .is-invalid { border-color: #dc3545 !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="py-5 text-center">
        <h2>게시글 수정</h2>
        <p class="lead">내용을 수정한 후 완료 버튼을 눌러주세요.</p>
    </div>

    <form th:action="@{/post/{postId}/update(postId=${postId})}" th:object="${postUpdateDTO}" method="post">

        <div class="mb-3">
            <label th:for="title" class="form-label">제목</label>
            <input type="text" th:field="*{title}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''"
                   placeholder="제목을 입력하세요">
            <div class="field-error" th:errors="*{title}">제목 오류 메시지</div>
        </div>

        <div class="mb-3">
            <label th:for="content" class="form-label">내용</label>
            <textarea th:field="*{content}"
                      class="form-control"
                      rows="10"
                      th:classappend="${#fields.hasErrors('content')} ? 'is-invalid' : ''"
                      placeholder="내용을 입력하세요"></textarea>
            <div class="field-error" th:errors="*{content}">내용 오류 메시지</div>
        </div>

        <hr class="my-4">

        <div class="row g-2">
            <div class="col">
                <button class="w-100 btn btn-primary btn-lg" type="submit">수정 완료</button>
            </div>
            <div class="col">
                <button class="w-100 btn btn-secondary btn-lg"
                        type="button"
                        th:onclick="|location.href='@{/post/{id}(id=${postId})}'|">취소</button>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
