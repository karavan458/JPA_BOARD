<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Spring Board</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/post/list}">게시판</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-info fw-bold" href="/members/mypage">마이페이지</a>
                </li>
            </ul>

            <div class="d-flex align-items-center">
                <div th:if="${loginMember != null}" class="d-flex align-items-center">
                    <span class="text-light me-3">
                        <strong th:text="${loginMember.name}">사용자</strong>님 환영합니다
                    </span>
                    <form th:action="@{/members/logout}" method="post" style="margin: 0;">
                        <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
                    </form>
                </div>

                <div th:if="${loginMember == null}">
                    <a th:href="@{/members/login}" class="btn btn-outline-light btn-sm me-2">로그인</a>
                    <a th:href="@{/members/new}" class="btn btn-primary btn-sm">회원가입</a>
                </div>
            </div>
        </div>
    </div>
</nav>
</html>
