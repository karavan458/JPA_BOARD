<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Spring Board - Dashboard</title>
</head>
<body>

<div class="container" style="max-width: 600px; margin-top: 80px;">
    <div class="py-5 text-center bg-light rounded-3 border">
        <h1 class="display-5 fw-bold text-primary">환영합니다!</h1>
        <h3 class="mt-3"><span th:text="${loginMember.name}">사용자</span>님, 반갑습니다.</h3>
        <p class="lead mt-2">현재 시스템에 정상적으로 로그인되었습니다.</p>

        <hr class="my-4 mx-5">

        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center mb-3">
            <button type="button" class="btn btn-primary btn-lg px-4 gap-3">게시판 입장</button>

            <form th:action="@{/members/logout}" method="post">
                <button type="submit" class="btn btn-outline-danger btn-lg px-4">로그아웃</button>
            </form>
        </div>
    </div>

    <div class="mt-5 text-center text-muted">
        <small>© 2026 Spring JPA Board Toy Project</small>
    </div>
</div>

</body>
</html>
